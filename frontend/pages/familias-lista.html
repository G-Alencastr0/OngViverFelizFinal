<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Famílias Cadastradas - Viver Feliz</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <a href="dashboard.html" class="botao-voltar">

    </a>

    <div class="input-busca">
      <i data-lucide="search"></i> 
      <input type="text" id="buscaFamilia" placeholder="Buscar por nome ou CPF">

    </div>

       
    <div id="lista">
      </div>

      <i data-lucide="home"></i>

    <a href="doacoes-lista.html" class="item">

    <a href="estoque.html" class="item">
      <i data-lucide="layout-grid"></i>
      <p>Estoque</p>
    </a>
    <a href="entregas.html" class="item">
      <i data-lucide="truck"></i>
      <p>Entregas</p>
    </a>

  <script>
    // Inicializa todos os ícones da página
    lucide.createIcons();

  <script src="../js/familias-lista.js"></script>

</html>
