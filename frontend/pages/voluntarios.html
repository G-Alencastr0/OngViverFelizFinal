<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar - Viver Feliz

  </title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

 <div class="container">
    <h1>Gerenciar Voluntários</h1>

    <a href="dashboard.html" class="botao-voltar">
      <i data-lucide="chevron-left"></i> Voltar ao painel
    </a>

    <div class="input-busca">
      <i data-lucide="search"></i>
      <input type="text" id="buscaVoluntario" placeholder="Buscar por nome ou função">
    </div>

    <button class="botao" onclick="mostrarFormulario()">
      <i data-lucide="plus-circle"></i> Cadastrar novo voluntário
    </button>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Email</th>
          <th>Área</th>
          <th>Disponibilidade</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="listaVoluntarios">
        </tbody>
    </table>
    
    <div id="formulario" style="display: none;">
      <h2>Cadastro de Voluntário</h2>

      <form id="formVoluntario">

        <h3>Dados Pessoais</h3>

        <label for="nome">Nome completo</label>
        <input type="text" id="nome" required>

        <label for="nascimento">Data de nascimento</label>
        <input type="date" id="nascimento">

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00">

        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" placeholder="(00) 00000-0000">

        <label for="email">Email</label>
        <input type="email" id="email">

        <h3>Endereço</h3>

        <label for="rua">Rua / Avenida</label>
        <input type="text" id="rua">

        <label for="numero">Número</label>
        <input type="text" id="numero">

        <label for="bairro">Bairro</label>
        <input type="text" id="bairro">

        <label for="cidade">Cidade</label>
        <input type="text" id="cidade">

        <label for="estado">Estado</label>
        <input type="text" id="estado">

        <label for="cep">CEP</label>
        <input type="text" id="cep">

        <h3>Voluntariado</h3>

        <label for="area">Área de interesse</label>
        <select id="area">
          <option>Doações</option>
          <option>Eventos</option>
          <option>Educação</option>
          <option>Saúde</option>
          <option>Administrativo</option>
        </select>

        <label for="disponibilidade">Disponibilidade</label>
        <select id="disponibilidade">
          <option>Manhã</option>
          <option>Tarde</option>
          <option>Noite</option>
          <option>Fim de semana</option>
        </select>

        <label for="dias">Dias da semana</label>
        <input type="text" id="dias" placeholder="Ex: Segunda, Quarta e Sexta">

        <label for="experiencia">Já participou de voluntariado?</label>
        <select id="experiencia">
          <option>Sim</option>
          <option>Não</option>
        </select>

        <h3>Habilidades</h3>

        <label for="habilidades">Habilidades</label>
        <input type="text" id="habilidades" placeholder="Ex: cozinhar, ensinar, organizar eventos">

        <h3>Observações</h3>

        <textarea id="observacoes" rows="4"></textarea>

        <br>

        <button type="submit" class="botao">Salvar</button>
        <button type="button" class="botao" onclick="cancelarEdicao()">Cancelar</button>

      </form>
    </div>

  </div>

 <nav class="menu-inferior">
    <a href="dashboard.html" class="item">
      <i data-lucide="home"></i>
      <p>Início</p>
    </a>

    <a href="familias-lista.html" class="item">
      <i data-lucide="users"></i>
      <p>Famílias</p>
    </a>

    <a href="doacoes-lista.html" class="item">
      <i data-lucide="package"></i>
      <p>Doações</p>
    </a>


    <a href="voluntarios-lista.html" class="item">
      <i data-lucide="heart"></i>
      <p>Voluntários</p>
    </a>

    <a href="estoque.html" class="item">
      <i data-lucide="layout-grid"></i>
      <p>Estoque</p>
    </a>
</nav>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    // Inicializa os ícones da biblioteca Lucide
    lucide.createIcons();
  </script>
  <script src="../js/utils/mensagem.js"></script>
  <script src="../js/utils/cep.js"></script>
  <script src="../js/voluntarios.js"></script>
</body>

</html>
