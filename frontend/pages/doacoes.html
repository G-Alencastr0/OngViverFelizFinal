<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doações</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <div class="container">

    <h1>Gerenciar Doações</h1>

   <a href="dashboard.html" class="botao-voltar">
    <i data-lucide="chevron-left"></i> Voltar ao painel
  </a>
    <br><br>

    <button class="botao" onclick="mostrarFormulario()"> Adicionar doação</button>

    <h3 id="tituloLista">Todas as doações</h3>

    <div class="filtros">
      <label><strong>Filtrar por categoria:</strong></label>
      <select id="filtroCategoria" onchange="filtrarSelect()">
        <option value="Todas">Todas</option>
        <option value="Roupas">Roupas</option>
        <option value="Alimentos">Alimentos</option>
        <option value="Brinquedos">Brinquedos</option>
        <option value="Higiene">Higiene</option>
        <option value="Limpeza">Limpeza</option>
        <option value="Material Escolar">Material Escolar</option>
        <option value="Utensílios">Utensílios</option>
      </select>
    </div>

    <table>

      <thead>
        <tr>
          <th>Item</th>
          <th>Categoria</th>
          <th>Quantidade</th>
          <th>Doador</th>
          <th>Data</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="listaDoacoes"></tbody>

    </table>

    <div id="formulario">

      <h2>Nova Doação</h2>

      <form id="formDoacao">

        <label>Categoria</label>
        <select id="categoria" onchange="atualizarItens()">
          <option>Roupas</option>
          <option>Alimentos</option>
          <option>Brinquedos</option>
          <option>Higiene</option>
          <option>Limpeza</option>
          <option>Material Escolar</option>
          <option>Utensílios</option>
        </select>

        <label>Item</label>
        <select id="item" required onchange="verificarOutroItem()">
          <option value="">Selecione um item</option>
        </select>

        <div id="campoOutroItem" style="display:none;">
          <label>Digite o item</label>
          <input type="text" id="outroItem">
        </div>

        <label>Quantidade</label>
        <input type="number" id="quantidade" value="1" min="1">

        <label>Doador</label>
        <input type="text" id="doador" required>

        <label>Data de Doação</label>
        <input type="date" id="data" required>

        <button type="submit" class="botao">Salvar</button>

      </form>

    </div>

  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
    <script src="../js/utils/mensagem.js"></script>
    <script src="../js/doacoes.js"></script>
</body>
  
</body>
</html>
